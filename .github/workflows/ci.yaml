name: CI

on:
  push:
    branches-ignore: [main, "release/**"]
  pull_request:

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        env: 
          ENV_DEV: ${{ secrets.ENV_DEV }}
          ENV_PROD: ${{ secrets.ENV_PROD }}

      - name: Linting
        run: flutter analyze
        working-directory: alfie_flutter

      - name: Setup LCOV
        uses: hrishikesh-kadam/setup-lcov@6c1aa0cc9e1c02f9f58f01ac599f1064ccc83470
        with:
          ref: HEAD

      - name: Run tests
        run: ./test_coverage.sh
        working-directory: alfie_flutter

      - name: Report LCOV
        uses: zgosalvez/github-actions-report-lcov@242badeaf8e48cbad6254e03c270bc80d1a72cc5
        with:
          coverage-files: alfie_flutter/coverage/lcov.info
          artifact-name: code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: alfie_flutter
          genhtml-ignore-errors: inconsistent,inconsistent

  build:
    name: Build ${{ matrix.platform }}
    if: github.event_name == 'pull_request'
    needs: test-and-lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android
            os: ubuntu-latest
            build-cmd: flutter build apk --release
            artifact-path: alfie_flutter/build/app/outputs/flutter-apk/app-release.apk
            artifact-name: android-apk

          - platform: iOS
            os: macos-latest
            build-cmd: flutter build ipa --release --no-codesign
            artifact-path: alfie_flutter/build/ios/archive/Runner.xcarchive
            artifact-name: ios-build-archive

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env
        env: 
          ENV_DEV: ${{ secrets.ENV_DEV }}
          ENV_PROD: ${{ secrets.ENV_PROD }}

      - name: Build Application
        run: ${{ matrix.build-cmd }}
        working-directory: alfie_flutter

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

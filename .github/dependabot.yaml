version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore/deps-actions:"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pub"
    directory: "/alfie_flutter" 
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore/deps-flutter:"
    groups:
      flutter-dependencies:
        patterns:
          - "*"